# ──────────────────────────────────────────────
#  BREAKOUT PLATFORM – configuració principal
# ──────────────────────────────────────────────
server.port=8080

# ── MySQL (servidor central) ────────────────────
# Si MySQL no és accessible, l'app arrenca en mode
# Edge i guarda localment. Canvia host/port si cal.
spring.datasource.url=jdbc:mysql://localhost:3306/breakout_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ─────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── H2 Edge DB (fallback local) ──────────────────
# Activa la consola H2 per inspeccionar dades edge
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Edge storage ────────────────────────────────
# Assignar un nom aleatori assegura que múltiples terminals no es sobreescriguin el fitxer Edge
edge.storage.file=edge_data_${random.uuid}.json
# Temps entre intents de sincronització (en mil·lisegons)
edge.sync.interval.ms=2000

# ── Joc ─────────────────────────────────────────
game.board.width=800
game.board.height=600
game.ball.speed.initial=6.0
game.paddle.width=100
game.paddle.height=15
game.paddle.step=30
game.tick.ms=50
game.blocks.cols=10
game.blocks.rows=6
